<!DOCTYPE html>
<html>

<head>
    <title>Third Party Cookie Script</title>
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=soundcloud.com" />
</head>

<body>

    <script>
        (function () {

            function setCookie(name, value, days) {
                let expires = "";
                if (days) {
                    const date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = "; expires=" + date.toUTCString();
                }

                // IMPORTANT: this sets cookies on THIS domain (usot25.github.io)
                document.cookie = name + "=" + value + expires + "; path=/; SameSite=None; Secure";
            }

            setCookie("thirdparty_perf", "analytics_cookie", 30);
            setCookie("thirdparty_marketing", "ad_cookie", 90);
            setCookie("thirdparty_social", "social_cookie", 90);
            console.log("third-party cookies set on usot25.github.io (3)");

        })();
    </script>

    third-party cookie iframe active

</body>

</html>
